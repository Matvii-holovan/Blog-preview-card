<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Figtree:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main">
    <section class="card">
      <div class="card-content">
        <img
          class="card-image"
          src="./assets/images/illustration-article.svg"
          alt="Illustration of an article"
        />
        <div class="card-text">
          <h3 class="card-title">Learning</h3>
          <p class="card-date">Published 21 Dec 2023</p>
          <h2 class="card-heading">HTML & CSS foundations</h2>
          <p class="card-description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="card-author">
          <img class="card-author-img" src="./assets/images/image-avatar.webp" alt="Daniel Cook" />
          <span class="card-author-name">Greg Hooper</span>
        </div>
      </div>
    </section></main>
  </body>
</html>
